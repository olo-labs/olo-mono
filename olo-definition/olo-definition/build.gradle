plugins {
    id 'java-library'
    id 'maven-publish'
}

description = 'Serializable workflow graph definitions for the Open LLM Orchestrator (OLO)'

repositories {
    mavenLocal()
    mavenCentral()
}

apply from: rootProject.file('../gradle/olo-mono-repo.gradle')
configureOloMonoPublishing(project)
configureOloMonoRepositories(repositories)

dependencies {
    api 'org.olo:olo-spi:0.1.0-SNAPSHOT'
    api 'org.olo:olo-annotation:0.1.0-SNAPSHOT'
    testImplementation 'org.olo:olo-core-nodes:0.1.0-SNAPSHOT'
    api 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
    api 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'
    api 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.18.2'

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.assertj:assertj-core:3.27.3'
}

java {
    withJavadocJar()
    withSourcesJar()
}

jar {
    manifest {
        attributes(
            'Implementation-Title': project.name,
            'Implementation-Version': project.version
        )
    }
}

def samplesDir = rootProject.layout.projectDirectory.dir('samples')
def configurationDir = rootProject.layout.projectDirectory.dir('olo-configuration/default')
def dynamicGraphCreationDir = rootProject.layout.projectDirectory.dir('olo-configuration/dynamic-graph-creation')
def researchPlannerDir = rootProject.layout.projectDirectory.dir('olo-configuration/research-planner')
def travelPlannerDir = rootProject.layout.projectDirectory.dir('olo-configuration/travel-planner')
def logRcaAnalysisDir = rootProject.layout.projectDirectory.dir('olo-configuration/log-rca-analysis')
def performanceTriageDir = rootProject.layout.projectDirectory.dir('olo-configuration/performance-triage')
def securityIncidentResponseDir = rootProject.layout.projectDirectory.dir('olo-configuration/security-incident-response')
def releaseReadinessReviewDir = rootProject.layout.projectDirectory.dir('olo-configuration/release-readiness-review')
def apiIntegrationTriageDir = rootProject.layout.projectDirectory.dir('olo-configuration/api-integration-triage')
def capacityPlanningDir = rootProject.layout.projectDirectory.dir('olo-configuration/capacity-planning')
def literatureReviewDir = rootProject.layout.projectDirectory.dir('olo-configuration/literature-review')

tasks.register('generateSamples', Test) {
    group = 'build'
    description = 'Regenerate workflow JSON/YAML samples via SampleWorkflowRegenerationTest'
    dependsOn compileTestJava
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootProject.projectDir
    systemProperty 'olo.samples.dir', samplesDir.asFile.absolutePath
    filter {
        includeTestsMatching 'org.olo.definition.samples.SampleWorkflowRegenerationTest'
    }
}

tasks.register('generateConfiguration', Test) {
    group = 'build'
    description = 'Regenerate olo-configuration/default presets via DefaultConfigurationRegenerationTest'
    dependsOn compileTestJava
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootProject.projectDir
