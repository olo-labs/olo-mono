tasks.register('generateAllScenarios') {
    group = 'build'
    description = 'Regenerate all multi-agent scenario collections under olo-configuration/'
    dependsOn generateResearchPlanner, generateTravelPlanner, generateLogRcaAnalysis,
            generatePerformanceTriage, generateSecurityIncidentResponse, generateReleaseReadinessReview,
            generateApiIntegrationTriage, generateCapacityPlanning, generateLiteratureReview
}

tasks.named('test', Test) {
    dependsOn generateSamples, generateConfiguration
    workingDir = rootProject.projectDir
    systemProperty 'olo.samples.dir', samplesDir.asFile.absolutePath
    systemProperty 'olo.configuration.dir', configurationDir.asFile.absolutePath
    systemProperty 'olo.dynamicGraphCreation.configuration.dir', dynamicGraphCreationDir.asFile.absolutePath
    systemProperty 'olo.researchPlanner.configuration.dir', researchPlannerDir.asFile.absolutePath
    systemProperty 'olo.travelPlanner.configuration.dir', travelPlannerDir.asFile.absolutePath
    systemProperty 'olo.logRcaAnalysis.configuration.dir', logRcaAnalysisDir.asFile.absolutePath
    systemProperty 'olo.performanceTriage.configuration.dir', performanceTriageDir.asFile.absolutePath
    systemProperty 'olo.securityIncidentResponse.configuration.dir', securityIncidentResponseDir.asFile.absolutePath
    systemProperty 'olo.releaseReadinessReview.configuration.dir', releaseReadinessReviewDir.asFile.absolutePath
    systemProperty 'olo.apiIntegrationTriage.configuration.dir', apiIntegrationTriageDir.asFile.absolutePath
    systemProperty 'olo.capacityPlanning.configuration.dir', capacityPlanningDir.asFile.absolutePath
    systemProperty 'olo.literatureReview.configuration.dir', literatureReviewDir.asFile.absolutePath
    filter {
        excludeTestsMatching 'org.olo.definition.samples.SampleWorkflowRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.DefaultConfigurationRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.dynamicgraphcreation.DynamicGraphCreationRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.researchplanner.ResearchPlannerRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.travelplanner.TravelPlannerRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.logrcaanalysis.LogRcaAnalysisRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.performancetriage.PerformanceTriageRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.securityincidentresponse.SecurityIncidentResponseRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.releasereadinessreview.ReleaseReadinessReviewRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.apiintegrationtriage.ApiIntegrationTriageRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.capacityplanning.CapacityPlanningRegenerationTest'
        excludeTestsMatching 'org.olo.definition.configuration.literaturereview.LiteratureReviewRegenerationTest'
    }
}

tasks.named('check') {
    dependsOn generateSamples, generateConfiguration
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifactId = 'olo-definition'
        }
    }
}
