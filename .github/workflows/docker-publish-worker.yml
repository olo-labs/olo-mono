# Build and push olo-worker (Temporal runner) image to Docker Hub (+ GHCR)
# Repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Pull: docker pull <DOCKERHUB_USERNAME>/olo-worker:0.1.0-SNAPSHOT
name: Publish Worker Docker image

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: olo-worker

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Verify Docker Hub secrets
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Add repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to publish to Docker Hub."
            exit 1
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout olo-mono
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve worker version
        id: version
        run: |
          LIB_VERSION=$(sed -n "s/^version = ['\"]\(.*\)['\"]/\1/p" olo-worker/build.gradle | head -1)
          if [ -z "$LIB_VERSION" ]; then
            echo "::error::Could not read version from olo-worker/build.gradle"
            exit 1
          fi
          echo "id=$LIB_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing with worker version: $LIB_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (Docker Hub)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.id }}
            type=raw,value=latest

      - name: Docker metadata (GHCR)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.id }}
            type=raw,value=latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./olo-worker/Dockerfile
          push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push }}
          tags: |
            ${{ steps.meta-dockerhub.outputs.tags }}
            ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max